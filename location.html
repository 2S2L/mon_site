<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2S2L • Location de matériel</title>

  <!-- W3.CSS + police -->
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:300,400,600,700&display=swap" />
  <style> html,body{font-family:"Raleway",sans-serif;} </style>

  <!-- Ton CSS (cards, etc.) -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/w3-custom.css">
</head>
<body>

  <!-- Top bar -->
  <div class="w3-top">
    <div class="w3-bar w3-white w3-card">
      <a href="index.html" class="w3-bar-item w3-button w3-wide"><b>2S2L</b></a>
      <div class="w3-right w3-hide-small">
        <a href="location.html" class="w3-bar-item w3-button w3-black">Location</a>
        <a href="prestation.html" class="w3-bar-item w3-button">Prestations</a>
      </div>
    </div>
  </div>

  <!-- En-tête -->
  <header class="w3-display-container w3-light-grey" style="padding-top:90px">
    <div class="w3-content" style="max-width:1100px">
      <h1 class="w3-xxlarge w3-margin-top">Location de matériel</h1>
      <p class="w3-text-grey">Sélectionnez vos équipements puis demandez un devis par email.
        Le prix est par soirée d'utilisation.</p>
    </div>
  </header>

  <!-- Contenu -->
  <div class="w3-content w3-padding-32" style="max-width:1100px">

    <!-- Grille d’équipements (remplie dynamiquement par panier.js) -->
    <div id="equipment-list" class="w3-row-padding w3-margin-top">
      <!-- Les cartes seront injectées ici par JS -->
    </div>


<!-- PANIER (Total + Formulaire) -->
<div class="w3-panel w3-pale-blue w3-leftbar w3-border-blue w3-round w3-margin-top">

  <h3 class="w3-margin-top">
    Total : <span id="total-price" class="w3-text-blue">0</span> €
  </h3>

  <form
    id="location-form"
    class="w3-container w3-padding-16 w3-white w3-round-large"
    method="POST"
    action="https://formsubmit.co/2s2l.events@gmx.fr"
  >
  <!-- Vos champs visibles -->
  <label class="w3-text-black"><b>Votre adresse email</b></label>
  <input
    class="w3-input w3-border w3-round w3-margin-bottom"
    type="email"
    id="customer-email"
    name="email"
    required
    placeholder="votre.email@example.com"
  />

  <label class="w3-text-black"><b>Date de l'événement</b></label>
  <input
    class="w3-input w3-border w3-round w3-margin-bottom"
    type="date"
    id="event-date"
    name="event_date"
    required
  />

  <label class="w3-text-black"><b>Commentaires (optionnel)</b></label>
  <textarea
    class="w3-input w3-border w3-round w3-margin-bottom"
    id="customer-comments"
    name="comments"
    rows="4"
    placeholder="Informations supplémentaires, besoins spécifiques, lieu exact, horaires..."
  ></textarea>

  <!-- Champs cachés transmis à FormSubmit -->
  <!-- Redirection "merci" après envoi -->
  <input type="hidden" name="_next" value="https://2S2L.fr/location.html" />
  <!-- Sujet du mail que tu reçois -->
  <input type="hidden" name="_subject" value="Nouvelle demande de devis 2S2L" />
  <!-- reCAPTCHA (par défaut activé). Mets false si tu veux le désactiver -->
  <input type="hidden" name="_captcha" value="true" />
  <!-- Anti-spam honeypot -->
  <input type="text" name="_honey" style="display:none" />

  <!-- Champs cachés que l’on remplira en JS avant l’envoi -->
  <input type="hidden" id="cart-summary" name="cart_summary" />
  <input type="hidden" id="cart-total" name="cart_total" />

  <button
    type="submit"
    class="w3-button w3-blue w3-round-large w3-hover-indigo w3-large w3-margin-top">
    Demander un devis
  </button>
</form>

</div>


  </div>

  <!-- Footer -->
  <footer class="w3-center w3-padding-32 w3-small w3-light-grey">
    <p>© 2026 2S2L — Tous droits réservés.</p>
  </footer>

    <script src="js/panier.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
